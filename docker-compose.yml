services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elimu360}
      POSTGRES_USER: ${POSTGRES_USER:-elimu360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elimu360_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elimu360} -d ${POSTGRES_DB:-elimu360}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://elimu360:elimu360_password@postgres:5432/elimu360
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file: .env.example
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres-data:
  
