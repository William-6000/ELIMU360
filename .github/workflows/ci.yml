name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: elimu360
          POSTGRES_USER: elimu360
          POSTGRES_PASSWORD: elimu360_password
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U elimu360 -d elimu360"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm test
      
